version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agentic_team_postgres
    restart: always
    environment:
      POSTGRES_USER: ai_team
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: agent_state
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_team -d agent_state"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agentic_team_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The FastAPI application can be run locally via `uvicorn src.app:app --reload`
  # or packaged into a Docker container later.

volumes:
  postgres_data:
  redis_data:
